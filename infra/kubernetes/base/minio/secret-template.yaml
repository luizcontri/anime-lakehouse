apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: anime-lakehouse
type: Opaque
stringData:
  MINIO_ROOT_USER: CHANGE_ME
  MINIO_ROOT_PASSWORD: CHANGE_ME

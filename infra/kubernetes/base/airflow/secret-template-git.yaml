apiVersion: v1
kind: Secret
metadata:
  name: airflow-git-credentials
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
    app.kubernetes.io/part-of: anime-lakehouse
type: Opaque
stringData:
  # GitHub username or any non-empty string when using a token
  GIT_SYNC_USERNAME: CHANGE_ME
  # GitHub personal access token with read access to the repository
  GIT_SYNC_PASSWORD: CHANGE_ME
# This is a template for kubeseal. Do not apply directly with real values.
# kubeseal --controller-name=sealed-secrets-controller \
#          --controller-namespace=kube-system \
#          --format yaml \
#          -f secret-template-git.yaml > airflow-git-sealed-secret.yaml

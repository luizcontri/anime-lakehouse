apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: airflow-db
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow-db
    app.kubernetes.io/part-of: anime-lakehouse
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-db
  serviceName: airflow-db
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: airflow
            - name: POSTGRES_PASSWORD
              value: airflow_local_dev
            - name: POSTGRES_DB
              value: airflow
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - airflow
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - airflow
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: airflow-db
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
    app.kubernetes.io/part-of: anime-lakehouse
type: Opaque
stringData:
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  fernet-key: CHANGE_ME
  # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  webserver-secret-key: CHANGE_ME
# This is a template for kubeseal. Do not apply directly with real values.
# kubeseal --controller-name=sealed-secrets-controller \
#          --controller-namespace=kube-system \
#          --format yaml \
#          -f secret-template-credentials.yaml > airflow-sealed-secret.yaml
